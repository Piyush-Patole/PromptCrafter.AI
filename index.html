<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptCraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-bg: #F0F2F5; /* Ambient off-white */
        --color-surface: #FFFFFF;
        --color-surface-alt: #F1F5F9;
        --color-border: #E2E8F0;
        --color-border-hover: #CBD5E1;
        --color-primary: #8B5CF6; /* Vibrant Purple */
        --color-primary-light: #EC4899; /* Vibrant Pink */
        --color-text: #0F172A;
        --color-text-muted: #475569;
        --color-text-faint: #94A3B8;
        --color-green: #10B981; /* Emerald */
        --color-red: #F43F5E; /* Rose */
        --color-amber: #F59E0B;
        --color-cyan: #06B6D4;
        --color-shadow: rgba(14, 15, 38, 0.08); /* Soft colored shadow */
      }
      body {
        margin: 0;
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      * {
        box-sizing: border-box;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-bg);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(99,102,241,0.3);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(99,102,241,0.6);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
